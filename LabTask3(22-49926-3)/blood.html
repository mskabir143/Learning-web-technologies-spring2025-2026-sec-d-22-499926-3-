<!DOCTYPE html>
<html>
<head>
    <title>Step 6: Blood Group</title>
</head>
<body>
    <h2>Step 6: Blood Group</h2>

    <form onsubmit="return validateBloodGroup()">
        Blood Group:
        <select id="blood">
            <option value="">Select</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
        </select><br><br>

        <span id="bloodError" style="color:red"></span><br><br>
        <input type="submit" value="Next">
    </form>

    <script src="blood.js"></script>
</body>
</html>
