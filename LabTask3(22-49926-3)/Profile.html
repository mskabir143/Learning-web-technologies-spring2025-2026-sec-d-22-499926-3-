<!DOCTYPE html>
<html>
<head>
    <title>Person Profile</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin: 20px auto;
        }
        td {
            padding: 8px;
        }
        input, select {
            width: 100%;
        }
    </style>
</head>
<body>
    <h2 style="text-align:center;">Person Profile</h2>

    <form id="profileForm" onsubmit="return submitProfile()">
        <table border="1">
            <tr>
                <td>Name:</td>
                <td><input type="text" id="name"></td>
            </tr>
            <tr>
                <td>Email:</td>
                <td><input type="text" id="email"></td>
            </tr>
            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" name="gender" id="male" value="Male"> Male
                    <input type="radio" name="gender" id="female" value="Female"> Female
                    <input type="radio" name="gender" id="other" value="Other"> Other
                </td>
            </tr>
            <tr>
                <td>Date of Birth:</td>
                <td>
                    <input type="text" id="dd" size="2"> /
                    <input type="text" id="mm" size="2"> /
                    <input type="text" id="yyyy" size="4">
                </td>
            </tr>
            <tr>
                <td>Degree:</td>
                <td>
                    <input type="checkbox" id="ssc"> SSC
                    <input type="checkbox" id="hsc"> HSC
                    <input type="checkbox" id="bsc"> BSc
                    <input type="checkbox" id="msc"> MSc
                </td>
            </tr>
            <tr>
                <td>Blood Group:</td>
                <td>
                    <select id="blood">
                        <option value="">Select</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>User ID:</td>
                <td><input type="text" id="userid"></td>
            </tr>
            <tr>
                <td>Picture:</td>
                <td><input type="file" id="picture"></td>
            </tr>
        </table>

        <div style="text-align:center; margin-top:20px;">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>
    </form>

    <script src="Profile.js"></script>
</body>
</html>
